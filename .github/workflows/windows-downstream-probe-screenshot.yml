name: windows-downstream-probe-screenshot

on:
  workflow_dispatch:
    inputs:
      emsi_ref:
        description: EMSI monorepo branch, tag, or SHA to capture
        required: false
        default: main
      runtime_ref:
        description: winui3-mac-test-runtime branch, tag, or SHA for capture tooling
        required: false
        default: main

jobs:
  downstream-probe-reference:
    runs-on: windows-latest
    steps:
      - name: Checkout runtime tools
        uses: actions/checkout@v4
        with:
          repository: MarlonJD/winui3-mac-test-runtime
          ref: ${{ inputs.runtime_ref }}
          path: winui3-mac-test-runtime

      - name: Checkout EMSI monorepo
        uses: actions/checkout@v4
        with:
          repository: MarlonJD/emsi_monorepo
          ref: ${{ inputs.emsi_ref }}
          submodules: recursive
          path: emsi_monorepo

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Windows App Runtime 1.7
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP "WindowsAppRuntimeInstall-x64.exe"
          Invoke-WebRequest `
            -Uri "https://aka.ms/windowsappsdk/1.7/1.7.250401001/windowsappruntimeinstall-x64.exe" `
            -OutFile $installer

          & $installer --quiet
          if ($LASTEXITCODE -ne 0) {
            throw "Windows App Runtime installer failed with exit code $LASTEXITCODE."
          }

      - name: Build capture tool and downstream probe
        shell: pwsh
        run: |
          dotnet build winui3-mac-test-runtime/tools/WindowsWindowCapture/WindowsWindowCapture.csproj --configuration Release
          msbuild emsi_monorepo/apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/MeetingChallenge.WinUI.MacRuntimeProbe.csproj /restore /p:Configuration=Release

      - name: Capture downstream probe scenarios
        shell: pwsh
        run: |
          $runnerImage = $env:ImageVersion
          if ([string]::IsNullOrWhiteSpace($runnerImage)) {
            $runnerImage = $env:ImageOS
          }

          $scenarios = @(
            @{ Name = "login-light"; Path = "emsi_monorepo/apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/login-light.json"; RelativePath = "apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/login-light.json" },
            @{ Name = "shell-staff-light"; Path = "emsi_monorepo/apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/shell-staff-light.json"; RelativePath = "apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/shell-staff-light.json" },
            @{ Name = "messages-multiline-light"; Path = "emsi_monorepo/apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/messages-multiline-light.json"; RelativePath = "apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/messages-multiline-light.json" },
            @{ Name = "admin-dashboard-light"; Path = "emsi_monorepo/apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/admin-dashboard-light.json"; RelativePath = "apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/admin-dashboard-light.json" },
            @{ Name = "admin-workbench-light"; Path = "emsi_monorepo/apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/admin-workbench-light.json"; RelativePath = "apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/admin-workbench-light.json" },
            @{ Name = "command-search-light"; Path = "emsi_monorepo/apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/command-search-light.json"; RelativePath = "apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/command-search-light.json" },
            @{ Name = "status-states-light"; Path = "emsi_monorepo/apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/status-states-light.json"; RelativePath = "apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/status-states-light.json" },
            @{ Name = "settings-profile-light"; Path = "emsi_monorepo/apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/settings-profile-light.json"; RelativePath = "apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/scenarios/settings-profile-light.json" }
          )

          $captureTool = "winui3-mac-test-runtime/tools/WindowsWindowCapture/bin/Release/net10.0-windows/WindowsWindowCapture.dll"
          $fixtureProject = "apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/MeetingChallenge.WinUI.MacRuntimeProbe.csproj"
          $fixtureExecutable = "emsi_monorepo/apps/windows/tests/MeetingChallenge.WinUI.MacRuntimeProbe/bin/Release/net10.0-windows10.0.19041.0/MeetingChallenge.WinUI.MacRuntimeProbe.exe"

          foreach ($scenario in $scenarios) {
            $scenarioJson = Get-Content $scenario.Path -Raw | ConvertFrom-Json
            $viewport = "$($scenarioJson.viewport.width)x$($scenarioJson.viewport.height)"
            $fixtureScenarioPath = (Resolve-Path $scenario.Path).Path
            $outDir = "artifacts/windows-downstream-probe-screenshots/$($scenario.Name)"
            New-Item -ItemType Directory -Force $outDir | Out-Null
            $launchLog = Join-Path $outDir "native-launch.log"
            $env:WINUI3_MAC_NATIVE_LAUNCH_LOG = $launchLog

            dotnet $captureTool `
              --title "Meeting Challenge Windows macOS Runtime Probe" `
              --output "$outDir/windows-reference.png" `
              --metadata-output "$outDir/windows-reference.json" `
              --client-area `
              --require-title-match `
              --timeout-seconds 60 `
              --reference-source native-winui `
              --fixture-project $fixtureProject `
              --scenario $scenario.RelativePath `
              --scenario-name $scenario.Name `
              --commit-sha "${{ github.sha }}" `
              --workflow-run-id "${{ github.run_id }}" `
              --runner-image $runnerImage `
              --viewport $viewport `
              --scale "$($scenarioJson.scale)" `
              --theme $scenarioJson.theme `
              --settle-ms 1000 `
              -- $fixtureExecutable --scenario $fixtureScenarioPath

            $captureExitCode = $LASTEXITCODE
            Remove-Item Env:\WINUI3_MAC_NATIVE_LAUNCH_LOG -ErrorAction SilentlyContinue
            if ($captureExitCode -ne 0) {
              if (Test-Path $launchLog) {
                Write-Host "===== Native launch log for $($scenario.Name) ====="
                Get-Content $launchLog -Raw
              }

              throw "Downstream native WinUI reference capture failed for $($scenario.Name) with exit code $captureExitCode."
            }

            $metadata = Get-Content "$outDir/windows-reference.json" -Raw | ConvertFrom-Json
            if ($metadata.referenceSource -ne "native-winui") {
              throw "Windows reference provenance for $($scenario.Name) was '$($metadata.referenceSource)', expected native-winui."
            }
            if ($metadata.captureMode -ne "client-area") {
              throw "Windows reference capture mode for $($scenario.Name) was '$($metadata.captureMode)', expected client-area."
            }
            if ($metadata.dimensions.width -ne $scenarioJson.viewport.width -or $metadata.dimensions.height -ne $scenarioJson.viewport.height) {
              throw "Windows reference dimensions for $($scenario.Name) were $($metadata.dimensions.width)x$($metadata.dimensions.height), expected $viewport."
            }
          }

      - name: Upload downstream probe screenshots
        uses: actions/upload-artifact@v4
        with:
          name: windows-downstream-probe-screenshots
          path: emsi_monorepo/artifacts/windows-downstream-probe-screenshots
