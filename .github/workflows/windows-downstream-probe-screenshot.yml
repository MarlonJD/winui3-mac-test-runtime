name: windows-downstream-probe-screenshot

on:
  workflow_dispatch:
    inputs:
      downstream_repository:
        description: Private downstream repository in owner/name form
        required: true
      downstream_ref:
        description: Downstream repository branch, tag, or SHA to capture
        required: false
        default: main
      runtime_ref:
        description: winui3-mac-test-runtime branch, tag, or SHA for capture tooling
        required: false
        default: main
      downstream_probe_project:
        description: Path to the downstream WinUI probe .csproj
        required: true
      downstream_probe_executable:
        description: Path to the built downstream WinUI probe executable
        required: true
      downstream_probe_scenario_dir:
        description: Directory containing downstream probe scenarios
        required: true
      downstream_probe_title:
        description: Native downstream probe window title to capture
        required: true

jobs:
  downstream-probe-reference:
    runs-on: windows-latest
    steps:
      - name: Checkout runtime tools
        uses: actions/checkout@v4
        with:
          repository: MarlonJD/winui3-mac-test-runtime
          ref: ${{ inputs.runtime_ref }}
          path: winui3-mac-test-runtime

      - name: Checkout downstream repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.downstream_repository }}
          ref: ${{ inputs.downstream_ref }}
          submodules: recursive
          path: downstream-app

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Windows App Runtime 1.7
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP "WindowsAppRuntimeInstall-x64.exe"
          Invoke-WebRequest `
            -Uri "https://aka.ms/windowsappsdk/1.7/1.7.250401001/windowsappruntimeinstall-x64.exe" `
            -OutFile $installer

          & $installer --quiet
          if ($LASTEXITCODE -ne 0) {
            throw "Windows App Runtime installer failed with exit code $LASTEXITCODE."
          }

      - name: Build capture tool and downstream probe
        shell: pwsh
        run: |
          dotnet build winui3-mac-test-runtime/tools/WindowsWindowCapture/WindowsWindowCapture.csproj --configuration Release
          msbuild "downstream-app/${{ inputs.downstream_probe_project }}" /restore /p:Configuration=Release

      - name: Capture downstream probe scenarios
        shell: pwsh
        run: |
          $runnerImage = $env:ImageVersion
          if ([string]::IsNullOrWhiteSpace($runnerImage)) {
            $runnerImage = $env:ImageOS
          }

          $scenarioRoot = "downstream-app/${{ inputs.downstream_probe_scenario_dir }}"
          $scenarioRelativeRoot = "${{ inputs.downstream_probe_scenario_dir }}"
          $scenarios = @(
            @{ Name = "login-light"; Path = "$scenarioRoot/login-light.json"; RelativePath = "$scenarioRelativeRoot/login-light.json" },
            @{ Name = "shell-staff-light"; Path = "$scenarioRoot/shell-staff-light.json"; RelativePath = "$scenarioRelativeRoot/shell-staff-light.json" },
            @{ Name = "messages-multiline-light"; Path = "$scenarioRoot/messages-multiline-light.json"; RelativePath = "$scenarioRelativeRoot/messages-multiline-light.json" },
            @{ Name = "admin-dashboard-light"; Path = "$scenarioRoot/admin-dashboard-light.json"; RelativePath = "$scenarioRelativeRoot/admin-dashboard-light.json" },
            @{ Name = "admin-workbench-light"; Path = "$scenarioRoot/admin-workbench-light.json"; RelativePath = "$scenarioRelativeRoot/admin-workbench-light.json" },
            @{ Name = "command-search-light"; Path = "$scenarioRoot/command-search-light.json"; RelativePath = "$scenarioRelativeRoot/command-search-light.json" },
            @{ Name = "status-states-light"; Path = "$scenarioRoot/status-states-light.json"; RelativePath = "$scenarioRelativeRoot/status-states-light.json" },
            @{ Name = "settings-profile-light"; Path = "$scenarioRoot/settings-profile-light.json"; RelativePath = "$scenarioRelativeRoot/settings-profile-light.json" }
          )

          $captureTool = "winui3-mac-test-runtime/tools/WindowsWindowCapture/bin/Release/net10.0-windows/WindowsWindowCapture.dll"
          $fixtureProject = "${{ inputs.downstream_probe_project }}"
          $fixtureExecutable = "downstream-app/${{ inputs.downstream_probe_executable }}"

          foreach ($scenario in $scenarios) {
            $scenarioJson = Get-Content $scenario.Path -Raw | ConvertFrom-Json
            $expectedWidth = [Math]::Min([int]$scenarioJson.viewport.width, 960)
            $expectedHeight = [Math]::Min([int]$scenarioJson.viewport.height, 640)
            $viewport = "${expectedWidth}x${expectedHeight}"
            $fixtureScenarioPath = (Resolve-Path $scenario.Path).Path
            $outDir = "artifacts/windows-downstream-probe-screenshots/$($scenario.Name)"
            New-Item -ItemType Directory -Force $outDir | Out-Null
            $launchLog = Join-Path $outDir "native-launch.log"
            $env:WINUI3_MAC_NATIVE_LAUNCH_LOG = $launchLog
            Write-Host "Probe launch must support Environment.GetCommandLineArgs() when WinUI launch arguments are empty."
            $expectedRoute = "signed-out"
            foreach ($interaction in $scenarioJson.interactions) {
              if ($interaction.type -eq "assertProperty" -and
                  $interaction.target -eq "CurrentRouteStatusTextBlock" -and
                  $interaction.key -eq "Text" -and
                  -not [string]::IsNullOrWhiteSpace($interaction.parameter)) {
                $expectedRoute = $interaction.parameter
              } elseif ($interaction.type -eq "selectNavigation" -and -not [string]::IsNullOrWhiteSpace($interaction.target)) {
                switch ($interaction.target) {
                  "HomeNavigationItem" { $expectedRoute = "home" }
                  "ChannelsNavigationItem" { $expectedRoute = "messages" }
                  "SettingsNavigationItem" { $expectedRoute = "status-states" }
                  "ProfileNavigationItem" { $expectedRoute = "settings-profile" }
                  "AdminNavigationItem" { $expectedRoute = "admin" }
                  "AdminWorkbenchNavigationItem" { $expectedRoute = "admin-workbench" }
                }
              }
            }

            dotnet $captureTool `
              --title "${{ inputs.downstream_probe_title }}" `
              --output "$outDir/windows-reference.png" `
              --metadata-output "$outDir/windows-reference.json" `
              --client-area `
              --reject-black-border `
              --require-title-match `
              --timeout-seconds 60 `
              --reference-source native-winui `
              --fixture-project $fixtureProject `
              --scenario $scenario.RelativePath `
              --scenario-name $scenario.Name `
              --commit-sha "${{ github.sha }}" `
              --workflow-run-id "${{ github.run_id }}" `
              --runner-image $runnerImage `
              --viewport $viewport `
              --scale "$($scenarioJson.scale)" `
              --theme $scenarioJson.theme `
              --settle-ms 2000 `
              -- $fixtureExecutable --scenario $fixtureScenarioPath

            $captureExitCode = $LASTEXITCODE
            Remove-Item Env:\WINUI3_MAC_NATIVE_LAUNCH_LOG -ErrorAction SilentlyContinue
            if ($captureExitCode -ne 0) {
              if (Test-Path $launchLog) {
                Write-Host "===== Native launch log for $($scenario.Name) ====="
                Get-Content $launchLog -Raw
              }

              throw "Downstream native WinUI reference capture failed for $($scenario.Name) with exit code $captureExitCode."
            }

            if (-not (Test-Path $launchLog)) {
              throw "Downstream native WinUI reference capture for $($scenario.Name) did not create native launch log."
            }
            $launchLogText = Get-Content $launchLog -Raw
            Write-Host "===== Native launch log for $($scenario.Name) ====="
            Write-Host $launchLogText
            if ($launchLogText -notmatch [regex]::Escape("ExpectedRoute=$expectedRoute")) {
              throw "Downstream native WinUI reference capture for $($scenario.Name) did not report expected route $expectedRoute."
            }
            if ($launchLogText -notmatch [regex]::Escape("FinalRoute=$expectedRoute")) {
              throw "Downstream native WinUI reference capture for $($scenario.Name) did not report expected route $expectedRoute as final route."
            }

            $metadata = Get-Content "$outDir/windows-reference.json" -Raw | ConvertFrom-Json
            if ($metadata.referenceSource -ne "native-winui") {
              throw "Windows reference provenance for $($scenario.Name) was '$($metadata.referenceSource)', expected native-winui."
            }
            if ($metadata.captureMode -ne "client-area") {
              throw "Windows reference capture mode for $($scenario.Name) was '$($metadata.captureMode)', expected client-area."
            }
            if ($metadata.dimensions.width -ne $expectedWidth -or $metadata.dimensions.height -ne $expectedHeight) {
              throw "Windows reference dimensions for $($scenario.Name) were $($metadata.dimensions.width)x$($metadata.dimensions.height), expected $viewport."
            }
          }

      - name: Upload downstream probe screenshots
        uses: actions/upload-artifact@v4
        with:
          name: windows-downstream-probe-screenshots
          path: artifacts/windows-downstream-probe-screenshots
