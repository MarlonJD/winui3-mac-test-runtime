name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Private-name denylist scan
        run: bash tools/private-name-denylist/private-name-scan.sh

      - name: Build
        run: dotnet build -v minimal /m:1 /nr:false

      - name: Test
        run: dotnet test --no-build

      - name: Full strict scenario sweep
        run: |
          set -euo pipefail

          sweep_root="artifacts/strict-scenario-sweep"
          mkdir -p "$sweep_root"

          count=0
          passed=0
          failed=0
          rc=0

          while IFS= read -r scenario; do
            case "$scenario" in
              fixtures/ComponentParityLab.WinUI/*) project=fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj ;;
              fixtures/ControlGallery.MacTest/*) project=fixtures/ControlGallery.MacTest/ControlGallery.MacTest.csproj ;;
              fixtures/InteractionBindingApp.MacTest/*) project=fixtures/InteractionBindingApp.MacTest/InteractionBindingApp.MacTest.csproj ;;
              fixtures/ProductionSmoke.WinUI/*) project=fixtures/ProductionSmoke.WinUI/ProductionSmoke.WinUI.csproj ;;
              fixtures/PublicAdminWorkbench.WinUI/*) project=fixtures/PublicAdminWorkbench.WinUI/PublicAdminWorkbench.WinUI.csproj ;;
              fixtures/ResourceCatalogApp.WinUI/*) project=fixtures/ResourceCatalogApp.WinUI/ResourceCatalogApp.WinUI.csproj ;;
              fixtures/SampleAdminShell.MacTest/*) project=fixtures/SampleAdminShell.MacTest/SampleAdminShell.MacTest.csproj ;;
              fixtures/SettingsFormApp.WinUI/*) project=fixtures/SettingsFormApp.WinUI/SettingsFormApp.WinUI.csproj ;;
              fixtures/SingleWindowApp.WinUI/*) project=fixtures/SingleWindowApp.WinUI/SingleWindowApp.WinUI.csproj ;;
              *)
                echo "unknown project for $scenario"
                failed=$((failed + 1))
                rc=1
                continue
                ;;
            esac

            name="$(basename "$scenario" .json)"
            output="$sweep_root/$name"
            log="$sweep_root/$name.log"
            count=$((count + 1))

            printf '[%02d] %s\n' "$count" "$name"
            if dotnet run --no-build --project src/WinUI3.MacRunner/WinUI3.MacRunner.csproj -- \
              run --project "$project" --renderer skia-v2 --scenario "$scenario" --strict-visual --output "$output" > "$log" 2>&1; then
              passed=$((passed + 1))
              tail -n 3 "$log"
            else
              failed=$((failed + 1))
              rc=1
              echo "FAILED $name"
              tail -n 40 "$log"
            fi
          done < <(find fixtures -path '*scenarios/*.json' -type f | sort)

          printf 'strict scenario sweep: %d passed, %d failed, %d total\n' "$passed" "$failed" "$count"
          exit "$rc"

      - name: Corpus ingestion
        run: >-
          dotnet run --no-build --project src/WinUI3.MacRunner --
          ingest --manifest fixtures/corpus.json --output artifacts/corpus --check

      - name: Benchmark and flake gate
        run: >-
          dotnet run --no-build --project src/WinUI3.MacRunner --
          benchmark --output artifacts/production-gates/benchmark.json
          --iterations 3

      - name: Package dry run
        run: |
          mkdir -p artifacts/packages
          dotnet pack src/WinUI3.MacCompat/WinUI3.MacCompat.csproj --configuration Debug --no-build --output artifacts/packages
          dotnet pack src/WinUI3.MacRuntime/WinUI3.MacRuntime.csproj --configuration Debug --no-build --output artifacts/packages
          dotnet pack src/WinUI3.MacXaml/WinUI3.MacXaml.csproj --configuration Debug --no-build --output artifacts/packages
          dotnet pack src/WinUI3.MacRenderer.Skia/WinUI3.MacRenderer.Skia.csproj --configuration Debug --no-build --output artifacts/packages
          dotnet pack src/WinUI3.MacRunner/WinUI3.MacRunner.csproj --configuration Debug --no-build --output artifacts/packages
          dotnet pack src/WinUI3.MacTest.Sdk/WinUI3.MacTest.Sdk.csproj --configuration Debug --no-build --output artifacts/packages

      - name: Release readiness dry run
        run: >-
          dotnet run --no-build --project src/WinUI3.MacRunner --
          release-check --package-dir artifacts/packages
          --output artifacts/production-gates/release-readiness.json

      - name: Upload corpus inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-inventory
          path: artifacts/corpus
          if-no-files-found: ignore

      - name: Upload production gates
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-gates
          path: artifacts/production-gates
          if-no-files-found: ignore

      - name: Upload strict scenario sweep
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-scenario-sweep
          path: artifacts/strict-scenario-sweep
          if-no-files-found: ignore

      - name: Upload package dry run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-dry-run
          path: artifacts/packages
          if-no-files-found: ignore
