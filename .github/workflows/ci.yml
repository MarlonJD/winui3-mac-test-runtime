name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  portable-headless:
    runs-on: ubuntu-latest
    env:
      WINUI3_COMPAT_MODE: portable-headless
      WINUI3_COMPAT_DRIVER: internal
      WINUI3_COMPAT_RENDERER: skia-offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build portable-headless runtime
        run: dotnet build -v minimal /m:1 /nr:false

      - name: Portable-headless tests
        run: dotnet test --no-build --filter "PortableHeadless|Phase2|Phase3|Phase4|Phase5|Phase6|Phase7"

      - name: Portable-headless visual artifacts
        run: >-
          dotnet run --no-build --project src/WinUI3.MacRunner --
          product-evidence --profile strict-scenario-sweep
          --output artifacts/portable-headless/strict-scenario-sweep

      - name: Validate portable-headless artifact contract
        run: |
          test -n "$(find artifacts/portable-headless -name '*.png' -print -quit)"
          test -n "$(find artifacts/portable-headless -name '*.metadata.json' -print -quit)"

      - name: Upload portable-headless artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portable-headless-artifacts
          path: artifacts/portable-headless
          if-no-files-found: error

  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Private-name denylist scan
        run: bash tools/private-name-denylist/private-name-scan.sh

      - name: Build
        run: dotnet build -v minimal /m:1 /nr:false

      - name: Test
        run: dotnet test --no-build

      - name: Strict scenario sweep evidence
        run: >-
          dotnet run --no-build --project src/WinUI3.MacRunner --
          product-evidence --profile strict-scenario-sweep
          --output artifacts/product-evidence/strict-scenario-sweep

      - name: Public product evidence rollup
        run: >-
          dotnet run --no-build --project src/WinUI3.MacRunner --
          product-evidence --profile public-product
          --output artifacts/product-evidence/public-product

      - name: Corpus ingestion
        run: >-
          dotnet run --no-build --project src/WinUI3.MacRunner --
          ingest --manifest fixtures/corpus.json --output artifacts/corpus --check

      - name: Benchmark and flake gate
        run: >-
          dotnet run --no-build --project src/WinUI3.MacRunner --
          benchmark --output artifacts/production-gates/benchmark.json
          --iterations 3

      - name: Package dry run
        run: |
          mkdir -p artifacts/packages
          dotnet pack src/WinUI3.MacCompat/WinUI3.MacCompat.csproj --configuration Debug --no-build --output artifacts/packages
          dotnet pack src/WinUI3.MacRuntime/WinUI3.MacRuntime.csproj --configuration Debug --no-build --output artifacts/packages
          dotnet pack src/WinUI3.MacXaml/WinUI3.MacXaml.csproj --configuration Debug --no-build --output artifacts/packages
          dotnet pack src/WinUI3.MacRenderer.Skia/WinUI3.MacRenderer.Skia.csproj --configuration Debug --no-build --output artifacts/packages
          dotnet pack src/WinUI3.MacRunner/WinUI3.MacRunner.csproj --configuration Debug --no-build --output artifacts/packages
          dotnet pack src/WinUI3.MacTest.Sdk/WinUI3.MacTest.Sdk.csproj --configuration Debug --no-build --output artifacts/packages

      - name: Release readiness dry run
        run: >-
          dotnet run --no-build --project src/WinUI3.MacRunner --
          release-check --package-dir artifacts/packages
          --output artifacts/production-gates/release-readiness.json

      - name: Release candidate gate
        run: >-
          dotnet run --no-build --project src/WinUI3.MacRunner --
          release-candidate --package-dir artifacts/packages
          --output artifacts/production-gates/release-candidate.json

      - name: Upload corpus inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-inventory
          path: artifacts/corpus
          if-no-files-found: ignore

      - name: Upload production gates
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-gates
          path: artifacts/production-gates
          if-no-files-found: ignore

      - name: Upload strict scenario sweep
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-scenario-sweep
          path: artifacts/product-evidence/strict-scenario-sweep
          if-no-files-found: ignore

      - name: Upload product evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-evidence
          path: artifacts/product-evidence
          if-no-files-found: ignore

      - name: Upload package dry run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-dry-run
          path: artifacts/packages
          if-no-files-found: ignore
