              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-dialogs-flyouts-open-popup-light.json"
              FixtureProject = "fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj"
              FixtureExecutable = "fixtures/ComponentParityLab.WinUI/bin/Release/net8.0-windows10.0.19041.0/ComponentParityLab.WinUI.exe"
            },
            @{
              Name = "component-commands-menus-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-commands-menus-light.json"
              FixtureProject = "fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj"
              FixtureExecutable = "fixtures/ComponentParityLab.WinUI/bin/Release/net8.0-windows10.0.19041.0/ComponentParityLab.WinUI.exe"
            },
            @{
              Name = "component-commands-menus-command-invoked-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-commands-menus-command-invoked-light.json"
              FixtureProject = "fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj"
              FixtureExecutable = "fixtures/ComponentParityLab.WinUI/bin/Release/net8.0-windows10.0.19041.0/ComponentParityLab.WinUI.exe"
            },
            @{
              Name = "component-commands-menus-disabled-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-commands-menus-disabled-light.json"
              FixtureProject = "fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj"
              FixtureExecutable = "fixtures/ComponentParityLab.WinUI/bin/Release/net8.0-windows10.0.19041.0/ComponentParityLab.WinUI.exe"
            },
            @{
              Name = "component-commands-menus-open-popup-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-commands-menus-open-popup-light.json"
              FixtureProject = "fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj"
              FixtureExecutable = "fixtures/ComponentParityLab.WinUI/bin/Release/net8.0-windows10.0.19041.0/ComponentParityLab.WinUI.exe"
            },
            @{
              Name = "component-navigation-workbench-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-navigation-workbench-light.json"
              FixtureProject = "fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj"
              FixtureExecutable = "fixtures/ComponentParityLab.WinUI/bin/Release/net8.0-windows10.0.19041.0/ComponentParityLab.WinUI.exe"
            },
            @{
              Name = "component-status-pickers-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-status-pickers-light.json"
              FixtureProject = "fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj"
              FixtureExecutable = "fixtures/ComponentParityLab.WinUI/bin/Release/net8.0-windows10.0.19041.0/ComponentParityLab.WinUI.exe"
            },
            @{
              Name = "component-status-pickers-loading-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-status-pickers-loading-light.json"
              FixtureProject = "fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj"
              FixtureExecutable = "fixtures/ComponentParityLab.WinUI/bin/Release/net8.0-windows10.0.19041.0/ComponentParityLab.WinUI.exe"
            },
            @{
              Name = "component-status-pickers-error-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-status-pickers-error-light.json"
              FixtureProject = "fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj"
              FixtureExecutable = "fixtures/ComponentParityLab.WinUI/bin/Release/net8.0-windows10.0.19041.0/ComponentParityLab.WinUI.exe"
            },
            @{
              Name = "component-status-pickers-success-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-status-pickers-success-light.json"
              FixtureProject = "fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj"
              FixtureExecutable = "fixtures/ComponentParityLab.WinUI/bin/Release/net8.0-windows10.0.19041.0/ComponentParityLab.WinUI.exe"
            },
            @{
              Name = "component-layout-media-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-layout-media-light.json"
              FixtureProject = "fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj"
              FixtureExecutable = "fixtures/ComponentParityLab.WinUI/bin/Release/net8.0-windows10.0.19041.0/ComponentParityLab.WinUI.exe"
            },
            @{
              Name = "component-layout-media-dark"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-layout-media-dark.json"
              FixtureProject = "fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj"
              FixtureExecutable = "fixtures/ComponentParityLab.WinUI/bin/Release/net8.0-windows10.0.19041.0/ComponentParityLab.WinUI.exe"
            },
            @{
              Name = "component-layout-media-high-contrast"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-layout-media-high-contrast.json"
              FixtureProject = "fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj"
              FixtureExecutable = "fixtures/ComponentParityLab.WinUI/bin/Release/net8.0-windows10.0.19041.0/ComponentParityLab.WinUI.exe"
            },
            @{
              Name = "production-smoke-light"
              Path = "fixtures/ProductionSmoke.WinUI/scenarios/production-smoke-light.json"
              FixtureProject = "fixtures/ProductionSmoke.WinUI/ProductionSmoke.WinUI.csproj"
              FixtureExecutable = "fixtures/ProductionSmoke.WinUI/bin/Release/net8.0-windows10.0.19041.0/ProductionSmoke.WinUI.exe"
            },
            @{
              Name = "production-e2e-workbench-light"
              Path = "fixtures/ProductionSmoke.WinUI/scenarios/production-e2e-workbench-light.json"
              FixtureProject = "fixtures/ProductionSmoke.WinUI/ProductionSmoke.WinUI.csproj"
              FixtureExecutable = "fixtures/ProductionSmoke.WinUI/bin/Release/net8.0-windows10.0.19041.0/ProductionSmoke.WinUI.exe"
            },
            @{
              Name = "single-window-continued-light"
              Path = "fixtures/SingleWindowApp.WinUI/scenarios/single-window-continued-light.json"
              FixtureProject = "fixtures/SingleWindowApp.WinUI/SingleWindowApp.WinUI.csproj"
              FixtureExecutable = "fixtures/SingleWindowApp.WinUI/bin/Release/net8.0-windows10.0.19041.0/SingleWindowApp.WinUI.exe"
            },
            @{
              Name = "settings-form-saved-light"
              Path = "fixtures/SettingsFormApp.WinUI/scenarios/settings-form-saved-light.json"
              FixtureProject = "fixtures/SettingsFormApp.WinUI/SettingsFormApp.WinUI.csproj"
              FixtureExecutable = "fixtures/SettingsFormApp.WinUI/bin/Release/net8.0-windows10.0.19041.0/SettingsFormApp.WinUI.exe"
            },
            @{
              Name = "resource-catalog-light"
              Path = "fixtures/ResourceCatalogApp.WinUI/scenarios/resource-catalog-light.json"
              FixtureProject = "fixtures/ResourceCatalogApp.WinUI/ResourceCatalogApp.WinUI.csproj"
              FixtureExecutable = "fixtures/ResourceCatalogApp.WinUI/bin/Release/net8.0-windows10.0.19041.0/ResourceCatalogApp.WinUI.exe"
            },
            @{
              Name = "resource-catalog-dark"
              Path = "fixtures/ResourceCatalogApp.WinUI/scenarios/resource-catalog-dark.json"
              FixtureProject = "fixtures/ResourceCatalogApp.WinUI/ResourceCatalogApp.WinUI.csproj"
              FixtureExecutable = "fixtures/ResourceCatalogApp.WinUI/bin/Release/net8.0-windows10.0.19041.0/ResourceCatalogApp.WinUI.exe"
            },
            @{
              Name = "resource-catalog-high-contrast"
              Path = "fixtures/ResourceCatalogApp.WinUI/scenarios/resource-catalog-high-contrast.json"
              FixtureProject = "fixtures/ResourceCatalogApp.WinUI/ResourceCatalogApp.WinUI.csproj"
              FixtureExecutable = "fixtures/ResourceCatalogApp.WinUI/bin/Release/net8.0-windows10.0.19041.0/ResourceCatalogApp.WinUI.exe"
            }
          )

          $runnerImage = (($env:ImageOS, $env:ImageVersion) | Where-Object { $_ }) -join " "
          if ([string]::IsNullOrWhiteSpace($runnerImage)) {
            $runnerImage = $env:RUNNER_OS
          }
          $captureTool = "tools/WindowsWindowCapture/bin/Release/net10.0-windows/WindowsWindowCapture.dll"
          function Test-RequiresNativeTargets($scenarioPath) {
            return $scenarioPath.StartsWith("fixtures/ComponentParityLab.WinUI/scenarios/") -or
              $scenarioPath.StartsWith("fixtures/PublicAdminWorkbench.WinUI/scenarios/")
          }

          function Assert-NativeReferenceTargets($scenario, $targetBoundsOutput) {
            if (!(Test-Path $targetBoundsOutput)) {
              throw "Native reference target export was not created for $($scenario.Name). Public component references require native-reference-targets.json with Windows native element bounds; macOS/runtime crop bounds are not valid source crop bounds."
            }

            $targets = Get-Content $targetBoundsOutput -Raw | ConvertFrom-Json
            if ($targets.referenceSource -ne "native-winui-element-bounds") {
              throw "Native reference target export for $($scenario.Name) was '$($targets.referenceSource)', expected native-winui-element-bounds."
            }
            if ([string]::IsNullOrWhiteSpace($targets.commitSha) -or $targets.commitSha -ne "${{ github.sha }}") {
              throw "Native reference target export for $($scenario.Name) is missing matching commitSha provenance."
            }
            if ([string]::IsNullOrWhiteSpace($targets.workflowRunId) -or $targets.workflowRunId -ne "${{ github.run_id }}") {
              throw "Native reference target export for $($scenario.Name) is missing matching workflowRunId provenance."
            }
            if (-not $targets.dimensions -or $targets.dimensions.width -le 0 -or $targets.dimensions.height -le 0) {
              throw "Native reference target export for $($scenario.Name) is missing positive capture dimensions."
            }
            if ([string]::IsNullOrWhiteSpace($targets.capturedAt)) {
              throw "Native reference target export for $($scenario.Name) is missing capturedAt provenance."
            }

            $scenarioJson = Get-Content $scenario.Path -Raw | ConvertFrom-Json
            $expectedTargets = @(
              foreach ($requirement in $scenarioJson.requirements) {
                if (-not [string]::IsNullOrWhiteSpace($requirement.target)) {
                  $requirement.target
                }
              }
            )
            if ($expectedTargets.Count -gt 0 -and (-not $targets.targets -or $targets.targets.Count -eq 0)) {
              throw "Native reference target export for $($scenario.Name) did not contain any target bounds."
            }

            $exportedTargets = @{}
            foreach ($target in $targets.targets) {
              if (-not [string]::IsNullOrWhiteSpace($target.target)) {
                $exportedTargets[$target.target] = $true
              }
              if ([string]::IsNullOrWhiteSpace($target.boundsSource) -or [string]::IsNullOrWhiteSpace($target.capturedAt)) {
                throw "Native reference target '$($target.target)' for $($scenario.Name) is missing boundsSource/capturedAt metadata."
              }
              if (-not $target.actualSize -or $target.actualSize.width -le 0 -or $target.actualSize.height -le 0) {
                throw "Native reference target '$($target.target)' for $($scenario.Name) is missing positive actualSize metadata."
              }
            }

            foreach ($expectedTarget in $expectedTargets) {
              if (-not $exportedTargets.ContainsKey($expectedTarget)) {
                throw "Native reference target export for $($scenario.Name) is missing required public row target '$expectedTarget'."
              }
            }

            return $targets
          }

          foreach ($scenario in $scenarios) {
            $scenarioJson = Get-Content $scenario.Path -Raw | ConvertFrom-Json
            $viewport = "$($scenarioJson.viewport.width)x$($scenarioJson.viewport.height)"
            $fixtureExecutable = (Resolve-Path $scenario.FixtureExecutable).Path
            $fixtureScenarioPath = (Resolve-Path $scenario.Path).Path
            $outDir = "artifacts/windows-reference-screenshots/$($scenario.Name)"
            $settleMs = if ($scenario.Name -like "*open-popup*") { 1800 } else { 750 }
            New-Item -ItemType Directory -Force $outDir | Out-Null
            $resolvedOutDir = (Resolve-Path $outDir).Path
            $launchLog = Join-Path $resolvedOutDir "native-launch.log"
            $targetBoundsOutput = Join-Path $resolvedOutDir "native-reference-targets.json"
            $env:WINUI3_MAC_NATIVE_LAUNCH_LOG = $launchLog
            $env:WINUI3_MAC_NATIVE_REFERENCE_TARGETS_OUTPUT = $targetBoundsOutput
            dotnet $captureTool `
              --title "WinUI3 Mac Test Runtime - $($scenario.Name)" `
              --output "$outDir/windows-reference.png" `
              --metadata-output "$outDir/windows-reference.json" `
              --client-area `
              --require-title-match `
              --timeout-seconds 60 `
              --reference-source native-winui `
              --fixture-project $scenario.FixtureProject `
              --scenario $scenario.Path `
              --scenario-name $scenario.Name `
              --commit-sha "${{ github.sha }}" `
              --workflow-run-id "${{ github.run_id }}" `
              --runner-image $runnerImage `
              --viewport $viewport `
              --scale "$($scenarioJson.scale)" `
              --theme $scenarioJson.theme `
              --settle-ms $settleMs `
              -- $fixtureExecutable --scenario $fixtureScenarioPath
            $captureExitCode = $LASTEXITCODE
            Remove-Item Env:\WINUI3_MAC_NATIVE_LAUNCH_LOG -ErrorAction SilentlyContinue
            Remove-Item Env:\WINUI3_MAC_NATIVE_REFERENCE_TARGETS_OUTPUT -ErrorAction SilentlyContinue
            if ($captureExitCode -ne 0) {
              if (Test-Path $launchLog) {
                Write-Host "===== Native launch log for $($scenario.Name) ====="
                Get-Content $launchLog -Raw
              }

              throw "Native WinUI reference capture failed for $($scenario.Name) with exit code $captureExitCode."
            }
            if (!(Test-Path "$outDir/windows-reference.png")) {
              throw "Windows reference screenshot was not created for $($scenario.Name)."
            }
            $metadata = Get-Content "$outDir/windows-reference.json" -Raw | ConvertFrom-Json
            if ($metadata.referenceSource -ne "native-winui") {
              throw "Windows reference provenance for $($scenario.Name) was '$($metadata.referenceSource)', expected native-winui."
            }
            if (Test-RequiresNativeTargets $scenario.Path) {
              $targets = Assert-NativeReferenceTargets $scenario $targetBoundsOutput
              $metadata | Add-Member -NotePropertyName nativeReferenceTargetsPath -NotePropertyValue "native-reference-targets.json" -Force
              $metadata | ConvertTo-Json -Depth 20 | Set-Content "$outDir/windows-reference.json"
            }
            elseif (Test-Path $targetBoundsOutput) {
              $targets = Assert-NativeReferenceTargets $scenario $targetBoundsOutput
              $metadata | Add-Member -NotePropertyName nativeReferenceTargetsPath -NotePropertyValue "native-reference-targets.json" -Force
              $metadata | ConvertTo-Json -Depth 20 | Set-Content "$outDir/windows-reference.json"
            }
          }

      - name: Dump native WinUI launch diagnostics
        if: failure()
        shell: pwsh
        run: |
          $diagnosticRoot = "artifacts/windows-native-launch-diagnostics"
          New-Item -ItemType Directory -Force $diagnosticRoot | Out-Null

          $startTime = (Get-Date).AddMinutes(-20)
          Get-WinEvent -FilterHashtable @{ LogName = "Application"; StartTime = $startTime } -ErrorAction SilentlyContinue |
            Where-Object {
              $_.LevelDisplayName -in @("Critical", "Error") -or
              $_.ProviderName -in @("Application Error", ".NET Runtime", "Windows Error Reporting")
            } |
            Select-Object TimeCreated, ProviderName, Id, LevelDisplayName, Message |
            Format-List |
            Tee-Object (Join-Path $diagnosticRoot "application-events.txt")

          Get-AppxPackage -Name "Microsoft.WindowsAppRuntime.1.7" -ErrorAction SilentlyContinue |
            Select-Object Name, Version, PackageFullName, InstallLocation |
            Format-List |
            Tee-Object (Join-Path $diagnosticRoot "windows-app-runtime-packages.txt")

          Get-ChildItem fixtures/PublicAdminWorkbench.WinUI/bin/Release -Recurse -File -ErrorAction SilentlyContinue |
            Select-Object FullName, Length |
            Format-Table -AutoSize |
            Tee-Object (Join-Path $diagnosticRoot "public-admin-output-files.txt")

          Get-ChildItem fixtures/ComponentParityLab.WinUI/bin/Release -Recurse -File -ErrorAction SilentlyContinue |
            Select-Object FullName, Length |
            Format-Table -AutoSize |
            Tee-Object (Join-Path $diagnosticRoot "component-lab-output-files.txt")

          Get-ChildItem fixtures/ProductionSmoke.WinUI/bin/Release -Recurse -File -ErrorAction SilentlyContinue |
            Select-Object FullName, Length |
            Format-Table -AutoSize |
            Tee-Object (Join-Path $diagnosticRoot "production-smoke-output-files.txt")

          Get-ChildItem fixtures/SingleWindowApp.WinUI/bin/Release -Recurse -File -ErrorAction SilentlyContinue |
            Select-Object FullName, Length |
            Format-Table -AutoSize |
            Tee-Object (Join-Path $diagnosticRoot "single-window-output-files.txt")

          Get-ChildItem fixtures/SettingsFormApp.WinUI/bin/Release -Recurse -File -ErrorAction SilentlyContinue |
            Select-Object FullName, Length |
            Format-Table -AutoSize |
            Tee-Object (Join-Path $diagnosticRoot "settings-form-output-files.txt")

          Get-ChildItem fixtures/ResourceCatalogApp.WinUI/bin/Release -Recurse -File -ErrorAction SilentlyContinue |
            Select-Object FullName, Length |
            Format-Table -AutoSize |
            Tee-Object (Join-Path $diagnosticRoot "resource-catalog-output-files.txt")

      - name: Upload native WinUI launch diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-native-launch-diagnostics
          path: artifacts/windows-native-launch-diagnostics

      - name: Upload Windows references
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-reference-screenshots
          path: artifacts/windows-reference-screenshots

  synthetic-probe-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build capture tool
        run: dotnet build tools/WindowsWindowCapture/WindowsWindowCapture.csproj --configuration Release

      - name: Build native probe
        run: dotnet build fixtures/WindowsNativeProbe/WindowsNativeProbe.csproj --configuration Release

      - name: Capture synthetic probe smoke scenarios
        shell: pwsh
        run: |
          $scenarios = @(
            @{
              Name = "shell-light"
              Path = "fixtures/SampleAdminShell.MacTest/scenarios/shell-light.json"
            },
            @{
              Name = "interactions-light"
              Path = "fixtures/InteractionBindingApp.MacTest/scenarios/interactions-light.json"
            },
            @{
              Name = "control-gallery-light"
              Path = "fixtures/ControlGallery.MacTest/scenarios/control-gallery-light.json"
            }
          )

          $runnerImage = (($env:ImageOS, $env:ImageVersion) | Where-Object { $_ }) -join " "
          if ([string]::IsNullOrWhiteSpace($runnerImage)) {
            $runnerImage = $env:RUNNER_OS
          }
          foreach ($scenario in $scenarios) {
            $scenarioJson = Get-Content $scenario.Path -Raw | ConvertFrom-Json
            $viewport = "$($scenarioJson.viewport.width)x$($scenarioJson.viewport.height)"
            $outDir = "artifacts/windows-synthetic-probe-smoke/$($scenario.Name)"
            New-Item -ItemType Directory -Force $outDir | Out-Null
            dotnet run --project tools/WindowsWindowCapture/WindowsWindowCapture.csproj --configuration Release -- `
              --title "WinUI3 Mac Test Runtime - $($scenario.Name)" `
              --output "$outDir/windows-reference.png" `
              --metadata-output "$outDir/windows-reference.json" `
              --client-area `
              --timeout-seconds 30 `
              --reference-source synthetic-probe `
              --fixture-project "fixtures/WindowsNativeProbe/WindowsNativeProbe.csproj" `
              --scenario $scenario.Path `
              --scenario-name $scenario.Name `
              --commit-sha "${{ github.sha }}" `
              --workflow-run-id "${{ github.run_id }}" `
              --runner-image $runnerImage `
              --viewport $viewport `
              --scale "$($scenarioJson.scale)" `
              --theme $scenarioJson.theme `
              -- dotnet run --project fixtures/WindowsNativeProbe/WindowsNativeProbe.csproj --configuration Release --no-build -- --scenario $scenario.Path
            if (!(Test-Path "$outDir/windows-reference.png")) {
              throw "Synthetic probe screenshot was not created for $($scenario.Name)."
            }
            $metadata = Get-Content "$outDir/windows-reference.json" -Raw | ConvertFrom-Json
            if ($metadata.referenceSource -ne "synthetic-probe") {
              throw "Synthetic probe provenance for $($scenario.Name) was '$($metadata.referenceSource)', expected synthetic-probe."
            }
          }

      - name: Upload synthetic probe smoke
        uses: actions/upload-artifact@v4
        with:
          name: windows-synthetic-probe-smoke
          path: artifacts/windows-synthetic-probe-smoke
