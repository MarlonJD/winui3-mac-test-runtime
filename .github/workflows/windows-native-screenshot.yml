name: windows-native-screenshot

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-native-screenshot.yml"
      - "src/**"
      - "tools/WindowsWindowCapture/**"
      - "fixtures/WindowsNativeProbe/**"
      - "fixtures/**/*.MacTest/**"
      - "fixtures/PublicAdminWorkbench.WinUI/**"
      - "fixtures/ComponentParityLab.WinUI/**"
      - "docs/compatibility/winui-component-inventory.json"

jobs:
  windows-reference:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build capture tool
        run: dotnet build tools/WindowsWindowCapture/WindowsWindowCapture.csproj --configuration Release

      - name: Build native probe
        run: dotnet build fixtures/WindowsNativeProbe/WindowsNativeProbe.csproj --configuration Release

      - name: Capture Windows reference scenarios
        shell: pwsh
        run: |
          $scenarios = @(
            @{
              Name = "shell-light"
              Path = "fixtures/SampleAdminShell.MacTest/scenarios/shell-light.json"
            },
            @{
              Name = "interactions-light"
              Path = "fixtures/InteractionBindingApp.MacTest/scenarios/interactions-light.json"
            },
            @{
              Name = "control-gallery-light"
              Path = "fixtures/ControlGallery.MacTest/scenarios/control-gallery-light.json"
            },
            @{
              Name = "public-admin-workbench-light"
              Path = "fixtures/PublicAdminWorkbench.WinUI/scenarios/public-admin-workbench-light.json"
            },
            @{
              Name = "component-basic-input-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-basic-input-light.json"
            },
            @{
              Name = "component-text-forms-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-text-forms-light.json"
            },
            @{
              Name = "component-collections-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-collections-light.json"
            },
            @{
              Name = "component-dialogs-flyouts-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-dialogs-flyouts-light.json"
            },
            @{
              Name = "component-commands-menus-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-commands-menus-light.json"
            },
            @{
              Name = "component-navigation-workbench-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-navigation-workbench-light.json"
            },
            @{
              Name = "component-status-pickers-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-status-pickers-light.json"
            },
            @{
              Name = "component-layout-media-light"
              Path = "fixtures/ComponentParityLab.WinUI/scenarios/component-layout-media-light.json"
            }
          )

          foreach ($scenario in $scenarios) {
            $outDir = "artifacts/windows-reference-screenshots/$($scenario.Name)"
            New-Item -ItemType Directory -Force $outDir | Out-Null
            dotnet run --project tools/WindowsWindowCapture/WindowsWindowCapture.csproj --configuration Release -- `
              --title "WinUI3 Mac Test Runtime - $($scenario.Name)" `
              --output "$outDir/windows-reference.png" `
              --metadata-output "$outDir/windows-reference.json" `
              --client-area `
              --timeout-seconds 30 `
              -- dotnet run --project fixtures/WindowsNativeProbe/WindowsNativeProbe.csproj --configuration Release --no-build -- --scenario $scenario.Path
            if (!(Test-Path "$outDir/windows-reference.png")) {
              throw "Windows reference screenshot was not created for $($scenario.Name)."
            }
          }

      - name: Upload Windows references
        uses: actions/upload-artifact@v4
        with:
          name: windows-reference-screenshots
          path: artifacts/windows-reference-screenshots

  visual-comparison:
    runs-on: macos-latest
    needs: windows-reference
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Windows references
        uses: actions/download-artifact@v4
        with:
          name: windows-reference-screenshots
          path: artifacts/windows-reference-screenshots

      - name: Build
        run: dotnet build

      - name: Render and compare visual scenarios
        shell: bash
        run: |
          set -euo pipefail
          scenarios=(
            "shell-light|./fixtures/SampleAdminShell.MacTest/SampleAdminShell.MacTest.csproj|./fixtures/SampleAdminShell.MacTest/scenarios/shell-light.json"
            "interactions-light|./fixtures/InteractionBindingApp.MacTest/InteractionBindingApp.MacTest.csproj|./fixtures/InteractionBindingApp.MacTest/scenarios/interactions-light.json"
            "control-gallery-light|./fixtures/ControlGallery.MacTest/ControlGallery.MacTest.csproj|./fixtures/ControlGallery.MacTest/scenarios/control-gallery-light.json"
            "public-admin-workbench-light|./fixtures/PublicAdminWorkbench.WinUI/PublicAdminWorkbench.WinUI.csproj|./fixtures/PublicAdminWorkbench.WinUI/scenarios/public-admin-workbench-light.json"
            "component-basic-input-light|./fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj|./fixtures/ComponentParityLab.WinUI/scenarios/component-basic-input-light.json"
            "component-text-forms-light|./fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj|./fixtures/ComponentParityLab.WinUI/scenarios/component-text-forms-light.json"
            "component-collections-light|./fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj|./fixtures/ComponentParityLab.WinUI/scenarios/component-collections-light.json"
            "component-dialogs-flyouts-light|./fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj|./fixtures/ComponentParityLab.WinUI/scenarios/component-dialogs-flyouts-light.json"
            "component-commands-menus-light|./fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj|./fixtures/ComponentParityLab.WinUI/scenarios/component-commands-menus-light.json"
            "component-navigation-workbench-light|./fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj|./fixtures/ComponentParityLab.WinUI/scenarios/component-navigation-workbench-light.json"
            "component-status-pickers-light|./fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj|./fixtures/ComponentParityLab.WinUI/scenarios/component-status-pickers-light.json"
            "component-layout-media-light|./fixtures/ComponentParityLab.WinUI/ComponentParityLab.WinUI.csproj|./fixtures/ComponentParityLab.WinUI/scenarios/component-layout-media-light.json"
          )

          for entry in "${scenarios[@]}"; do
            IFS='|' read -r name project scenario <<< "$entry"
            PATH="$PWD/tools:$PATH" winui3-mac-runner run \
              --project "$project" \
              --renderer skia-v2 \
              --scenario "$scenario" \
              --strict-visual \
              --reference "./artifacts/windows-reference-screenshots/$name/windows-reference.png" \
              --diff-output "./artifacts/windows-native-screenshot/$name"
          done

      - name: Upload reviewable visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-native-screenshot
          path: artifacts/windows-native-screenshot
